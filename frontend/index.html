<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Kingo YTDownloader</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="background-color" content="#080810" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kingo" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- SEO -->
    <meta name="description" content="Kingo YTDownloader — Fast, free YouTube video & audio downloader. Download MP4, MP3, and more with trim, playlist, and batch support." />

    <!-- Favicon -->
    <link rel="icon" href="/logo.png" type="image/png" />
  </head>
  <body style="margin:0;background:#080810">
    <div id="root"></div>

    <!-- Catch PWA install prompt before React loads -->
    <script>
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        window.__pwaPrompt = e;
      });
    </script>

    <!-- Register service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('SW registered'))
            .catch(() => {});
        });
      }
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
