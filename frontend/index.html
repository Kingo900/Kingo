<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Kingo YT Downloader</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kingo" />

    <!-- SEO -->
    <meta name="description" content="Fast, free YouTube video & audio downloader. Download MP4, MP3, and more with trim support." />

    <!-- Icon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%237c3aed'/><text y='.9em' font-size='70' x='15' font-weight='bold' fill='white'>K</text></svg>" />
  </head>
  <body style="margin:0">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
   <script>
      // Catch PWA prompt early before React loads
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        window.__pwaPrompt = e;
      });
    </script>
    <script>
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
